<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authvora — AI-Native Authentication Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
        }

        .glow-1 { top: -200px; left: -100px; background: #6366f1; }
        .glow-2 { bottom: -200px; right: -100px; background: #8b5cf6; }

        .container {
            position: relative;
            text-align: center;
            padding: 2rem;
            max-width: 640px;
        }

        .logo {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #a78bfa;
            margin-bottom: 2rem;
        }

        .logo span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #6366f1;
            border-radius: 2px;
            margin-right: 10px;
            vertical-align: middle;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.25rem;
            background: linear-gradient(135deg, #e4e4e7 0%, #a78bfa 50%, #6366f1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.125rem;
            color: #71717a;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            border: 1px solid #27272a;
            border-radius: 9999px;
            font-size: 0.875rem;
            color: #a1a1aa;
            background: rgba(39, 39, 42, 0.5);
            margin-bottom: 3rem;
        }

        .badge .dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #6366f1;
            color: #fff;
        }

        .btn-primary:hover {
            background: #4f46e5;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: #a1a1aa;
            border: 1px solid #27272a;
        }

        .btn-secondary:hover {
            border-color: #6366f1;
            color: #e4e4e7;
        }

        .footer {
            position: fixed;
            bottom: 2rem;
            font-size: 0.8rem;
            color: #3f3f46;
        }
    </style>
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="container">
        <div class="logo"><span></span>Authvora</div>

        <div class="badge">
            <div class="dot"></div>
            API is live at api.authvora.com
        </div>

        <h1>Authentication infrastructure for the AI era</h1>

        <p class="subtitle">
            Identity intelligence, risk-aware authentication, and AI agent access — built for modern applications.
        </p>

        <div class="links">
            <a href="https://api.authvora.com/health" class="btn-primary">API Status</a>
            <a href="https://github.com/rohit7209/authvora" class="btn-secondary">GitHub</a>
            <a href="https://www.npmjs.com/package/@authvora/node" class="btn-secondary">Node SDK</a>
            <a href="https://jitpack.io/#rohit7209/authvora-java" class="btn-secondary">Java SDK</a>
        </div>
    </div>

    <div class="footer">&copy; 2026 Authvora</div>
</body>
</html>
