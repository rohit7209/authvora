upstream authvora_gateway {
    server 127.0.0.1:8080;
}

# HTTP → HTTPS redirect for both domains
server {
    listen 80;
    server_name authvora.com api.authvora.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# API backend — api.authvora.com
server {
    listen 443 ssl;
    http2 on;
    server_name api.authvora.com;

    ssl_certificate /etc/letsencrypt/live/authvora.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/authvora.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 1m;

    location / {
        proxy_pass http://authvora_gateway;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass http://authvora_gateway/health;
        access_log off;
    }
}

# Dashboard frontend — authvora.com
server {
    listen 443 ssl;
    http2 on;
    server_name authvora.com;

    ssl_certificate /etc/letsencrypt/live/authvora.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/authvora.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Placeholder until dashboard is built
    # Replace root with proxy_pass to frontend app when ready
    root /var/www/authvora;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
