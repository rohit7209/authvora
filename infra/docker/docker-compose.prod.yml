version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: authvora-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../infra/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: authvora-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 96M
        reservations:
          memory: 64M

  auth-service:
    build:
      context: ../../services/auth-service
      dockerfile: Dockerfile
    container_name: authvora-auth-service
    restart: always
    environment:
      - PORT=8081
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_ISSUER=${JWT_ISSUER:-authvora}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 64M

  api-gateway:
    build:
      context: ../../services/api-gateway
      dockerfile: Dockerfile
    container_name: authvora-api-gateway
    restart: always
    environment:
      - PORT=8080
      - AUTH_SERVICE_URL=http://auth-service:8081
      - RISK_ENGINE_URL=http://risk-engine:8082
      - POLICY_ENGINE_URL=http://policy-engine:8083
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - auth-service
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  risk-engine:
    build:
      context: ../../services/risk-engine
      dockerfile: Dockerfile
    container_name: authvora-risk-engine
    restart: always
    environment:
      - PORT=8082
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/2
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  policy-engine:
    build:
      context: ../../services/policy-engine
      dockerfile: Dockerfile
    container_name: authvora-policy-engine
    restart: always
    environment:
      - PORT=8083
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  mcp-server:
    build:
      context: ../../services/mcp-server
      dockerfile: Dockerfile
    container_name: authvora-mcp-server
    restart: always
    environment:
      - PORT=8084
      - AUTH_SERVICE_URL=http://auth-service:8081
      - RISK_ENGINE_URL=http://risk-engine:8082
      - API_GATEWAY_URL=http://api-gateway:8080
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      - auth-service
      - risk-engine
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 64M

volumes:
  pgdata:
  redisdata:
